<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="100%" height="100%">
  <defs>
    <!-- Card Clip -->
    <clipPath id="card-clip">
      <rect x="5" y="5" width="90" height="130" rx="14" />
    </clipPath>
    
    <!-- Top Half Gradient -->
    <linearGradient id="top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2e5b" />
      <stop offset="100%" stop-color="#9b0022" />
    </linearGradient>
    
    <!-- Bottom Half Gradient -->
    <linearGradient id="bottom-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Gold Gradient for the 7 -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe66d" />
      <stop offset="50%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#d48a00" />
    </linearGradient>
  </defs>
  
  <!-- Card background clipped -->
  <g clip-path="url(#card-clip)">
    <!-- Top Half -->
    <rect x="5" y="5" width="90" height="65" fill="url(#top-grad)" />
    <!-- Bottom Half -->
    <rect x="5" y="70" width="90" height="65" fill="url(#bottom-grad)" />
    
    <!-- Subtle Diagonal Stripe Pattern as the "smart background" -->
    <g opacity="0.08" stroke="#ffffff" stroke-width="2">
      <line x1="-20" y1="20" x2="120" y2="160" />
      <line x1="0" y1="0" x2="120" y2="120" />
      <line x1="20" y1="-20" x2="120" y2="80" />
      <line x1="-40" y1="40" x2="80" y2="160" />
    </g>

    <!-- Stylized Joker Hat Watermark in the background -->
    <g fill="#ffffff" opacity="0.15" transform="translate(0, 15)">
      <path d="M 50,42 Q 42,28 26,38 Q 35,46 41,50 Q 45,35 50,22 Q 55,35 59,50 Q 65,46 74,38 Q 58,28 50,42 Z" />
      <circle cx="26" cy="38" r="3" />
      <circle cx="50" cy="22" r="3" />
      <circle cx="74" cy="38" r="3" />
    </g>
  </g>
  
  <!-- Inner Border with gold stroke -->
  <rect x="5" y="5" width="90" height="130" rx="14" fill="none" stroke="url(#gold-grad)" stroke-width="3.5" opacity="0.8" />
  
  <!-- Bold 7 in Center with Gold Gradient and Dark Shadow -->
  <polygon points="32,45 68,45 48,95 36,95 53,57 32,57" fill="url(#gold-grad)" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.5))" />
</svg>
