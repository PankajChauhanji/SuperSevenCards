<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 252" width="180" height="252">
  <rect x="3" y="3" width="174" height="246" rx="16" fill="#fdfbf5" stroke="#d8cfb8" stroke-width="2"/>
  <!-- Corners -->
  <g fill="#1c2b27" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <g>
      <text x="24" y="44" font-size="28" text-anchor="middle">J</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♣</text>
    </g>
    <g transform="rotate(180 90 126)">
      <text x="24" y="44" font-size="28" text-anchor="middle">J</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♣</text>
    </g>
  </g>
  <!-- Portrait Frame -->
  <rect x="42" y="42" width="96" height="168" rx="8" fill="none" stroke="#1c2b27" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <!-- Jack Portrait -->
  <g transform="translate(90, 126)">
    <!-- Top Half -->
    <g>
      <!-- Cap -->
      <path d="M -16,-28 C -16,-46 16,-46 16,-28 Z" fill="#1c2b27"/>
      <path d="M 0,-40 Q 12,-50 20,-43 Q 12,-36 0,-40" fill="#1c2b27"/>
      <!-- Face -->
      <path d="M -14,-28 L 14,-28 L 14,-6 Q 14,8 0,8 Q -14,8 -14,-6 Z" fill="#fdfbf5" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Eyes & Face details -->
      <circle cx="-5" cy="-12" r="1.5" fill="#1c2b27"/>
      <circle cx="5" cy="-12" r="1.5" fill="#1c2b27"/>
      <path d="M 0,-14 L 0,-9 L 2,-9" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#1c2b27" stroke-width="2" stroke-linecap="round"/>
      <!-- Shoulders/Collar -->
      <path d="M -28,35 L -18,8 Q 0,14 18,8 L 28,35 Z" fill="none" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -14,8 L -6,22 L 0,8 L 6,22 L 14,8" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <!-- Halberd/Spear -->
      <line x1="-22" y1="-20" x2="-22" y2="35" stroke="#1c2b27" stroke-width="2"/>
      <path d="M -26,-20 L -22,-30 L -18,-20 Z" fill="#1c2b27"/>
    </g>
    <!-- Bottom Half -->
    <g transform="rotate(180)">
      <!-- Cap -->
      <path d="M -16,-28 C -16,-46 16,-46 16,-28 Z" fill="#1c2b27"/>
      <path d="M 0,-40 Q 12,-50 20,-43 Q 12,-36 0,-40" fill="#1c2b27"/>
      <!-- Face -->
      <path d="M -14,-28 L 14,-28 L 14,-6 Q 14,8 0,8 Q -14,8 -14,-6 Z" fill="#fdfbf5" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Eyes & Face details -->
      <circle cx="-5" cy="-12" r="1.5" fill="#1c2b27"/>
      <circle cx="5" cy="-12" r="1.5" fill="#1c2b27"/>
      <path d="M 0,-14 L 0,-9 L 2,-9" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#1c2b27" stroke-width="2" stroke-linecap="round"/>
      <!-- Shoulders/Collar -->
      <path d="M -28,35 L -18,8 Q 0,14 18,8 L 28,35 Z" fill="none" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -14,8 L -6,22 L 0,8 L 6,22 L 14,8" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <!-- Halberd/Spear -->
      <line x1="-22" y1="-20" x2="-22" y2="35" stroke="#1c2b27" stroke-width="2"/>
      <path d="M -26,-20 L -22,-30 L -18,-20 Z" fill="#1c2b27"/>
    </g>
  </g>
</svg>
