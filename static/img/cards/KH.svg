<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 252" width="180" height="252">
  <rect x="3" y="3" width="174" height="246" rx="16" fill="#fdfbf5" stroke="#d8cfb8" stroke-width="2"/>
  <!-- Corners -->
  <g fill="#cf3b2e" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <g>
      <text x="24" y="44" font-size="28" text-anchor="middle">K</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♥</text>
    </g>
    <g transform="rotate(180 90 126)">
      <text x="24" y="44" font-size="28" text-anchor="middle">K</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♥</text>
    </g>
  </g>
  <!-- Portrait Frame -->
  <rect x="42" y="42" width="96" height="168" rx="8" fill="none" stroke="#cf3b2e" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <!-- King Portrait -->
  <g transform="translate(90, 126)">
    <!-- Top Half -->
    <g>
      <!-- Crown -->
      <path d="M -20,-30 L -20,-45 L -10,-38 L 0,-52 L 10,-38 L 20,-45 L 20,-30 Z" fill="#cf3b2e"/>
      <line x1="-15" y1="-30" x2="15" y2="-30" stroke="#fdfbf5" stroke-width="2"/>
      <circle cx="-20" cy="-45" r="2.5" fill="#cf3b2e"/>
      <circle cx="0" cy="-52" r="2.5" fill="#cf3b2e"/>
      <circle cx="20" cy="-45" r="2.5" fill="#cf3b2e"/>
      <!-- Face -->
      <path d="M -15,-30 L 15,-30 L 15,-5 Q 15,10 0,10 Q -15,10 -15,-5 Z" fill="#fdfbf5" stroke="#cf3b2e" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Beard & Hair lines -->
      <path d="M -15,-20 Q -22,-10 -15,5 Q 0,22 15,5 Q 22,-10 15,-20" fill="none" stroke="#cf3b2e" stroke-width="2"/>
      <path d="M -15,0 L -12,12 L 0,18 L 12,12 L 15,0 Q 8,5 0,5 Q -8,5 -15,0 Z" fill="#cf3b2e"/>
      <path d="M -10,-3 Q 0,2 10,-3" stroke="#cf3b2e" stroke-width="2" fill="none"/>
      <!-- Eyes & Nose -->
      <line x1="-7" y1="-14" x2="-3" y2="-14" stroke="#cf3b2e" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="3" y1="-14" x2="7" y2="-14" stroke="#cf3b2e" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 0,-16 L 0,-10 L 3,-10" stroke="#cf3b2e" stroke-width="2.5" fill="none"/>
      <!-- Shoulders/Collar -->
      <path d="M -30,35 L -18,10 Q 0,15 18,10 L 30,35 Z" fill="none" stroke="#cf3b2e" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -12,10 L 0,25 L 12,10" stroke="#cf3b2e" stroke-width="2" fill="none"/>
      <!-- Scepter -->
      <line x1="24" y1="-10" x2="24" y2="35" stroke="#cf3b2e" stroke-width="2"/>
      <circle cx="24" cy="-14" r="4" fill="#cf3b2e"/>
    </g>
    <!-- Bottom Half -->
    <g transform="rotate(180)">
      <!-- Crown -->
      <path d="M -20,-30 L -20,-45 L -10,-38 L 0,-52 L 10,-38 L 20,-45 L 20,-30 Z" fill="#cf3b2e"/>
      <line x1="-15" y1="-30" x2="15" y2="-30" stroke="#fdfbf5" stroke-width="2"/>
      <circle cx="-20" cy="-45" r="2.5" fill="#cf3b2e"/>
      <circle cx="0" cy="-52" r="2.5" fill="#cf3b2e"/>
      <circle cx="20" cy="-45" r="2.5" fill="#cf3b2e"/>
      <!-- Face -->
      <path d="M -15,-30 L 15,-30 L 15,-5 Q 15,10 0,10 Q -15,10 -15,-5 Z" fill="#fdfbf5" stroke="#cf3b2e" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Beard & Hair lines -->
      <path d="M -15,-20 Q -22,-10 -15,5 Q 0,22 15,5 Q 22,-10 15,-20" fill="none" stroke="#cf3b2e" stroke-width="2"/>
      <path d="M -15,0 L -12,12 L 0,18 L 12,12 L 15,0 Q 8,5 0,5 Q -8,5 -15,0 Z" fill="#cf3b2e"/>
      <path d="M -10,-3 Q 0,2 10,-3" stroke="#cf3b2e" stroke-width="2" fill="none"/>
      <!-- Eyes & Nose -->
      <line x1="-7" y1="-14" x2="-3" y2="-14" stroke="#cf3b2e" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="3" y1="-14" x2="7" y2="-14" stroke="#cf3b2e" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 0,-16 L 0,-10 L 3,-10" stroke="#cf3b2e" stroke-width="2.5" fill="none"/>
      <!-- Shoulders/Collar -->
      <path d="M -30,35 L -18,10 Q 0,15 18,10 L 30,35 Z" fill="none" stroke="#cf3b2e" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -12,10 L 0,25 L 12,10" stroke="#cf3b2e" stroke-width="2" fill="none"/>
      <!-- Scepter -->
      <line x1="24" y1="-10" x2="24" y2="35" stroke="#cf3b2e" stroke-width="2"/>
      <circle cx="24" cy="-14" r="4" fill="#cf3b2e"/>
    </g>
  </g>
</svg>
