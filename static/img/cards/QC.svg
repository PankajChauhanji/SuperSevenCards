<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 252" width="180" height="252">
  <rect x="3" y="3" width="174" height="246" rx="16" fill="#fdfbf5" stroke="#d8cfb8" stroke-width="2"/>
  <!-- Corners -->
  <g fill="#1c2b27" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <g>
      <text x="24" y="44" font-size="28" text-anchor="middle">Q</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♣</text>
    </g>
    <g transform="rotate(180 90 126)">
      <text x="24" y="44" font-size="28" text-anchor="middle">Q</text>
      <text x="24" y="72" font-size="24" text-anchor="middle">♣</text>
    </g>
  </g>
  <!-- Portrait Frame -->
  <rect x="42" y="42" width="96" height="168" rx="8" fill="none" stroke="#1c2b27" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <!-- Queen Portrait -->
  <g transform="translate(90, 126)">
    <!-- Top Half -->
    <g>
      <!-- Crown -->
      <path d="M -16,-28 L -16,-40 L -8,-32 L 0,-48 L 8,-32 L 16,-40 L 16,-28 Z" fill="#1c2b27"/>
      <line x1="-12" y1="-28" x2="12" y2="-28" stroke="#fdfbf5" stroke-width="2"/>
      <circle cx="-16" cy="-40" r="2" fill="#1c2b27"/>
      <circle cx="0" cy="-48" r="2" fill="#1c2b27"/>
      <circle cx="16" cy="-40" r="2" fill="#1c2b27"/>
      <!-- Face -->
      <path d="M -12,-28 L 12,-28 L 12,-6 Q 12,8 0,8 Q -12,8 -12,-6 Z" fill="#fdfbf5" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Hair lines -->
      <path d="M -14,-22 C -20,-10 -20,15 -14,24" fill="none" stroke="#1c2b27" stroke-width="2"/>
      <path d="M 14,-22 C 20,-10 20,15 14,24" fill="none" stroke="#1c2b27" stroke-width="2"/>
      <!-- Eyes & Face details -->
      <circle cx="-5" cy="-12" r="1.5" fill="#1c2b27"/>
      <circle cx="5" cy="-12" r="1.5" fill="#1c2b27"/>
      <path d="M 0,-14 L 0,-9 L 2,-9" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <path d="M -4,-2 Q 0,1 4,-2" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <!-- Shoulders/Collar -->
      <path d="M -26,35 L -16,8 Q 0,12 16,8 L 26,35 Z" fill="none" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -8,10 Q 0,16 8,10" stroke="#1c2b27" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="14" r="2.5" fill="#1c2b27"/>
      <!-- Flower -->
      <path d="M 22,-5 Q 22,15 22,35" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <circle cx="22" cy="-9" r="3.5" fill="#1c2b27"/>
    </g>
    <!-- Bottom Half -->
    <g transform="rotate(180)">
      <!-- Crown -->
      <path d="M -16,-28 L -16,-40 L -8,-32 L 0,-48 L 8,-32 L 16,-40 L 16,-28 Z" fill="#1c2b27"/>
      <line x1="-12" y1="-28" x2="12" y2="-28" stroke="#fdfbf5" stroke-width="2"/>
      <circle cx="-16" cy="-40" r="2" fill="#1c2b27"/>
      <circle cx="0" cy="-48" r="2" fill="#1c2b27"/>
      <circle cx="16" cy="-40" r="2" fill="#1c2b27"/>
      <!-- Face -->
      <path d="M -12,-28 L 12,-28 L 12,-6 Q 12,8 0,8 Q -12,8 -12,-6 Z" fill="#fdfbf5" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Hair lines -->
      <path d="M -14,-22 C -20,-10 -20,15 -14,24" fill="none" stroke="#1c2b27" stroke-width="2"/>
      <path d="M 14,-22 C 20,-10 20,15 14,24" fill="none" stroke="#1c2b27" stroke-width="2"/>
      <!-- Eyes & Face details -->
      <circle cx="-5" cy="-12" r="1.5" fill="#1c2b27"/>
      <circle cx="5" cy="-12" r="1.5" fill="#1c2b27"/>
      <path d="M 0,-14 L 0,-9 L 2,-9" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <path d="M -4,-2 Q 0,1 4,-2" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <!-- Shoulders/Collar -->
      <path d="M -26,35 L -16,8 Q 0,12 16,8 L 26,35 Z" fill="none" stroke="#1c2b27" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M -8,10 Q 0,16 8,10" stroke="#1c2b27" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="14" r="2.5" fill="#1c2b27"/>
      <!-- Flower -->
      <path d="M 22,-5 Q 22,15 22,35" stroke="#1c2b27" stroke-width="2" fill="none"/>
      <circle cx="22" cy="-9" r="3.5" fill="#1c2b27"/>
    </g>
  </g>
</svg>
