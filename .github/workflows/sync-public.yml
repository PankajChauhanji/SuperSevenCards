name: Sync to Public Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # prevents Actions bot from overriding our token

      - name: Debug — Environment Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 STEP 1: Environment Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Runner OS      : $RUNNER_OS"
          echo "GitHub Actor   : $GITHUB_ACTOR"
          echo "GitHub Repo    : $GITHUB_REPOSITORY"
          echo "Branch         : $GITHUB_REF_NAME"
          echo "Commit SHA     : $GITHUB_SHA"
          echo ""

      - name: Debug — Check Token
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 STEP 2: Token Verification"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "❌ ERROR: PUBLIC_REPO_TOKEN is EMPTY!"
            echo "   → Go to repo Settings → Secrets → Check PUBLIC_REPO_TOKEN exists"
            exit 1
          else
            echo "✅ Token exists"
            echo "   Token length : ${#PUBLIC_REPO_TOKEN} characters"
            echo "   Token prefix : ${PUBLIC_REPO_TOKEN:0:4}****"
          fi
          echo ""

      - name: Debug — Check Source Files Before Removal
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 STEP 3: Source Files (Before Removal)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Root directory:"
          ls -la
          echo ""
          echo "📁 game/ folder:"
          ls -la game/ || echo "⚠️ game/ folder not found"
          echo ""
          echo "📁 sockets/ folder:"
          ls -la sockets/ || echo "⚠️ sockets/ folder not found"
          echo ""

      - name: Remove core logic and sensitive files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🗑️  STEP 4: Removing Sensitive Files"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          remove_file() {
            if [ -f "$1" ]; then
              rm -f "$1"
              echo "✅ Removed : $1"
            else
              echo "⚠️  Skipped : $1 (not found)"
            fi
          }

          remove_dir() {
            if [ -d "$1" ]; then
              rm -rf "$1"
              echo "✅ Removed : $1/"
            else
              echo "⚠️  Skipped : $1/ (not found)"
            fi
          }

          # ── Core game engine (room state, rules, scoring, manager) ──
          remove_file game/manager.py
          remove_file game/room.py

          # ── Core socket handlers (game flow, lobby, director loop) ──
          remove_file sockets/gameplay.py
          remove_file sockets/lobby.py

          # ── Test files (expose internal logic and edge cases) ──

          # ── Pycache folders (compiled bytecode, never needed in any repo) ──
          remove_dir game/__pycache__
          remove_dir sockets/__pycache__
          remove_dir __pycache__

          # ── Secrets and environment files ──
          remove_file .env
          remove_file .env.local
          remove_file .env.production

          # ── Workflow files (critical — prevents workflow scope error) ──
          remove_dir .github

          echo ""
          echo "📁 game/ folder after removal:"
          ls -la game/ || echo "⚠️ game/ folder not found"
          echo ""
          echo "📁 sockets/ folder after removal:"
          ls -la sockets/ || echo "⚠️ sockets/ folder not found"
          echo ""

      - name: Debug — Git Status Before Push
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 STEP 5: Git Status Before Push"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Git remotes:"
          git remote -v
          echo ""
          echo "Current branch:"
          git branch
          echo ""
          echo "Git log (last 3 commits):"
          git log --oneline -3
          echo ""

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 STEP 6: Pushing to Public Repo"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "⚙️  Configuring git identity..."
          git config user.name "PankajChauhanji"
          git config user.email "pankajchauhan.nitsri@gmail.com"
          echo "✅ Git identity set"

          echo ""
          echo "⚙️  Overriding credentials with our token..."
          git config --global url."https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "✅ Credentials overridden"

          echo ""
          echo "⚙️  Adding public remote..."
          git remote add public https://github.com/PankajChauhanji/SuperSevenCards.git
          echo "✅ Remote added"

          echo ""
          echo "⚙️  Staging changes..."
          git add -A
          echo "✅ Changes staged"

          echo ""
          echo "⚙️  Committing..."
          git commit -m "sync: update public snapshot" || echo "ℹ️  Nothing new to commit"

          echo ""
          echo "⚙️  Pushing to public repo (main branch)..."
          git push public main --force

          if [ $? -eq 0 ]; then
            echo ""
            echo "✅✅✅ SUCCESS — Public repo updated successfully!"
          else
            echo ""
            echo "❌❌❌ FAILED — Push was rejected. Check token permissions."
            exit 1
          fi